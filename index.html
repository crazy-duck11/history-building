<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国古代建筑首页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: "宋体", serif;
    }

    .opening {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 999;
      background: #000;
    }

    .opening-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: url("首图.jpg");
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: blur(12px);
      animation: bgFadeIn 2.2s ease-out forwards;
    }

    @keyframes bgFadeIn {
      to {
        opacity: 1;
        filter: blur(0px);
      }
    }

    .opening-mask {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
    }

    .title-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .title-char {
      position: absolute;
      font-size: clamp(42px, 9vw, 88px);
      color: #fff;
      font-weight: bold;
      font-family: "宋体", serif;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      opacity: 0;
      animation: inkIn 0.5s ease-out forwards;
    }

    /* 你自定义的每个字位置+大小，完全保留不动 */
    .char1 {
      left: 14%;
      top: 22%;
      font-size: 256px;
      animation-delay: 1.0s;
    }

    .char2 {
      left: 31%;
      top: 30%;
      font-size: 140px;
      animation-delay: 1.2s;
    }

    .char3 {
      left: 41%;
      top: 42%;
      font-size: 92px;
      animation-delay: 1.4s;
    }

    .char4 {
      left: 47%;
      top: 37%;
      font-size: 77px;
      animation-delay: 1.6s;
    }

    .char5 {
      left: 53%;
      top: 37%;
      font-size: 99px;
      animation-delay: 1.8s;
    }

    .char6 {
      left: 60%;
      top: 40%;
      font-size: 140px;
      animation-delay: 2.0s;
    }

    .char7 {
      left: 68%;
      top: 24%;
      font-size: 230px;
      animation-delay: 2.2s;
    }

    @keyframes inkIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ========== 修复按钮：加最高层级，确保能点击 ========== */
    .enter-btn {
      position: absolute;
      top: 68%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 42px;
      background: linear-gradient(135deg, #9c2c1a, #721c10);
      border: 2px solid #d4af37;
      border-radius: 8px;
      color: #f8f0e0;
      font-size: 18px;
      font-family: "仿宋", serif;
      letter-spacing: 2px;
      cursor: pointer;
      opacity: 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
      animation: btnFadeIn 1s ease-out 2.8s forwards;
      /* 核心修复：加这两行，按钮跳到最上层，可点击 */
      z-index: 99999;
      pointer-events: auto;
    }

    @keyframes btnFadeIn {
      to {
        opacity: 1;
      }
    }

    .enter-btn:hover {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 6px 22px rgba(212, 175, 55, 0.4);
    }

    .enter-btn:active {
      transform: translate(-50%, -50%) scale(1.02);
    }
  </style>
</head>

<body>
  <div class="opening">
    <div class="opening-bg"></div>
    <div class="opening-mask"></div>

    <div class="title-container">
      <span class="title-char char1">中</span>
      <span class="title-char char2">国</span>
      <span class="title-char char3">古</span>
      <span class="title-char char4">代</span>
      <span class="title-char char5">建</span>
      <span class="title-char char6">筑</span>
      <span class="title-char char7">志</span>
    </div>

    <button class="enter-btn" onclick="location.href='./次页正式版.html'" target="_blank">
      ❖ 进入探索 ❖
    </button>
  </div>
</body>

</html>
